<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        
        <div class="left-section">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRedwUqd66O8qgOXEStnWv9mO_fGP4CitZQl0GGTkpW0g&s=10" alt="3D Washing Machine Illustration">
        </div>

        <div class="right-section">
            <div class="form-container">
                
                <h1>Hello Again!</h1>
                <p class="subtitle">Welcome back! we missed you!</p>

                <form action="#">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Emailid@site.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Forgot Password</a>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <p class="register-link">Not a member? <a href="#">Register Now</a></p>
            </div>
        </div>
    </div>
</body>
</html>
